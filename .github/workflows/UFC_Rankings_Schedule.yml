name: Run Python Script and Sync to GCS

on:
  schedule:
    - cron: '0 0 * * 3'  
  workflow_dispatch: 

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false  

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
            python-version: '3.12'  
            cache: 'pip'

      - name: Install Python dependencies
        uses: py-actions/py-dependency-install@v4

      - name: Run Scrapers
        run: |
          # python UFC_Rankings_Scrape.py
          python UFCStatsScrape.py
          python MMA_Decision_Scrape.py

      - name: Commit and push changes
        run: |
          git config --global user.email 'bpaton50000@gmail.com'
          git config --global user.name 'brad-paton'
          git add .
          git commit -m "Updated $(date +%Y-%m-%d)" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/brad-paton/UFC_Rankings.git HEAD:main


      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Upload CSVs to GCS
        uses: 'google-github-actions/upload-cloud-storage@v2'
        with:
          path: 'datasets/'  
          glob: '*.csv'  
          destination: 'mma-data-bp'
          parent: false    
